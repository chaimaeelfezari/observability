name: CI - Observability Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for services
        run: |
          for i in {1..60}; do
            curl -sf http://localhost:3100/ready && break
            if [ $i -eq 30 ]; then echo "Loki timeout" && exit 1; fi
            sleep 5
          done
          echo "Waiting for Tempo..."
          for i in {1..30}; do
            curl -sf http://localhost:3200/ready && break
            if [ $i -eq 30 ]; then echo "Tempo timeout" && exit 1; fi
            sleep 5
          done