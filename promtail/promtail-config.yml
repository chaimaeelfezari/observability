server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Pipeline 1 - Logs Docker containers
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      # Stage 1 - parser le JSON Docker
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      # Stage 2 - extraire le vrai message
      - output:
          source: log

      # Stage 3 - ajouter labels utiles
      - labels:
          stream:

      # Stage 4 - parser le timestamp
      - timestamp:
          source: time
          format: RFC3339Nano

  # Pipeline 2 - Logs fichiers app Python
  - job_name: python-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: python-app
          app: observability
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      - json:
          expressions:
            log: log
      - output:
          source: log
      # Stage regex - extraire level et message
      - regex:
          expression: '(?P<level>INFO|ERROR|WARNING|DEBUG).*(?P<message>.*)'
      - labels:
          level: