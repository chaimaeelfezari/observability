server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Pipeline 1 - Logs Docker containers
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      # Stage 1 - parser le JSON Docker
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      # Stage 2 - extraire le vrai message
      - output:
          source: log

      # Stage 3 - ajouter labels utiles
      - labels:
          stream:

      # Stage 4 - parser le timestamp
      - timestamp:
          source: time
          format: RFC3339Nano

  # Pipeline 2 - Logs fichiers app Python
  - job_name: python-app
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [python-app]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/*.log'
    pipeline_stages:
      - json:
          expressions:
            log: log
      - output:
          source: log
      - regex:
          expression: '(?P<level>INFO|ERROR|WARNING|DEBUG).*(?P<message>.*)'
      - labels:
          level: